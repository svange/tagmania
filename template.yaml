AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Test infrastructure for tagmania - 3 clusters for parallel integration testing

Parameters:
  Cluster1Name:
    Type: String
    Default: test1
    Description: Name of the first test cluster (1 instance)

  Cluster2Name:
    Type: String
    Default: test2
    Description: Name of the second test cluster (2 instances)

  Cluster3Name:
    Type: String
    Default: test3
    Description: Name of the third test cluster (1 instance, for CLI tests)

  PipelineExecutionRoleName:
    Type: String
    Description: Name of the pipeline execution role that needs EC2 testing permissions

Resources:
  # VPC for test instances
  TestVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/24
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: tagmania-test-vpc

  # Internet Gateway
  TestIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: tagmania-test-igw

  # Attach IGW to VPC
  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref TestVPC
      InternetGatewayId: !Ref TestIGW

  # Public Subnet
  TestSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref TestVPC
      CidrBlock: 10.0.0.0/28
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: tagmania-test-subnet

  # Route Table
  TestRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref TestVPC
      Tags:
        - Key: Name
          Value: tagmania-test-rt

  # Route to Internet
  TestRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref TestRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref TestIGW

  # Associate Route Table with Subnet
  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref TestSubnet
      RouteTableId: !Ref TestRouteTable

  # Security Group (minimal - only outbound)
  TestSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Minimal security group for test instances
      VpcId: !Ref TestVPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: tagmania-test-sg

  # Cluster 1 - Single Instance
  Cluster1Instance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-minimal-kernel-default-x86_64}}'
      SubnetId: !Ref TestSubnet
      SecurityGroupIds:
        - !Ref TestSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 2
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${Cluster1Name}-web-01"
        - Key: Cluster
          Value: !Ref Cluster1Name
        - Key: Owner
          Value: test

  # Cluster 2 - Two Instances
  Cluster2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-minimal-kernel-default-x86_64}}'
      SubnetId: !Ref TestSubnet
      SecurityGroupIds:
        - !Ref TestSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 2
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${Cluster2Name}-api-01"
        - Key: Cluster
          Value: !Ref Cluster2Name
        - Key: Owner
          Value: test

  Cluster2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-minimal-kernel-default-x86_64}}'
      SubnetId: !Ref TestSubnet
      SecurityGroupIds:
        - !Ref TestSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 2
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${Cluster2Name}-db-01"
        - Key: Cluster
          Value: !Ref Cluster2Name
        - Key: Owner
          Value: test

  # Cluster 3 - Two Instances (for CLI tests, runs in parallel with Cluster 2)
  Cluster3Instance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-minimal-kernel-default-x86_64}}'
      SubnetId: !Ref TestSubnet
      SecurityGroupIds:
        - !Ref TestSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 2
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${Cluster3Name}-api-01"
        - Key: Cluster
          Value: !Ref Cluster3Name
        - Key: Owner
          Value: test

  # Managed Policy for EC2 testing operations
  EC2TestingPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-EC2TestingPolicy"
      Description: "Policy for EC2 testing operations on tagged clusters"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EC2ReadOperations
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeSnapshots
              - ec2:DescribeVolumes
              - ec2:DescribeImages
              - ec2:DescribeAvailabilityZones
            Resource: "*"
          - Sid: EC2InstanceOperations
            Effect: Allow
            Action:
              - ec2:StartInstances
              - ec2:StopInstances
            Resource: "*"
            Condition:
              StringEquals:
                ec2:ResourceTag/Cluster: [!Ref Cluster1Name, !Ref Cluster2Name, !Ref Cluster3Name]
          - Sid: EC2VolumeTaggedOperations
            Effect: Allow
            Action:
              - ec2:DeleteVolume
              - ec2:AttachVolume
              - ec2:CreateTags
              - ec2:DeleteTags
            Resource: "*"
            Condition:
              StringEquals:
                ec2:ResourceTag/Cluster: [!Ref Cluster1Name, !Ref Cluster2Name, !Ref Cluster3Name]
          - Sid: EC2VolumeUntaggedOperations
            Effect: Allow
            Action:
              - ec2:CreateVolume
            Resource: "*"
          - Sid: EC2VolumeOperations
            Effect: Allow
            Action:
              - ec2:DetachVolume
            Resource: "*"
          - Sid: EC2SnapshotOperations
            Effect: Allow
            Action:
              - ec2:CreateSnapshot
              - ec2:DeleteSnapshot
              - ec2:CreateTags
            Resource: "*"
      Roles:
        - !Ref PipelineExecutionRoleName

Outputs:
  Cluster1Name:
    Description: Name of the first test cluster
    Value: !Ref Cluster1Name
    Export:
      Name: !Sub "${AWS::StackName}-Cluster1Name"

  Cluster2Name:
    Description: Name of the second test cluster
    Value: !Ref Cluster2Name
    Export:
      Name: !Sub "${AWS::StackName}-Cluster2Name"

  VPCId:
    Description: VPC ID
    Value: !Ref TestVPC
    Export:
      Name: !Sub "${AWS::StackName}-VPC"

  SubnetId:
    Description: Subnet ID
    Value: !Ref TestSubnet
    Export:
      Name: !Sub "${AWS::StackName}-Subnet"

  Cluster1Instance1Id:
    Description: Cluster 1 Instance 1 ID
    Value: !Ref Cluster1Instance1
    Export:
      Name: !Sub "${AWS::StackName}-Cluster1Instance1"

  Cluster2Instance1Id:
    Description: Cluster 2 Instance 1 ID
    Value: !Ref Cluster2Instance1
    Export:
      Name: !Sub "${AWS::StackName}-Cluster2Instance1"

  Cluster2Instance2Id:
    Description: Cluster 2 Instance 2 ID
    Value: !Ref Cluster2Instance2
    Export:
      Name: !Sub "${AWS::StackName}-Cluster2Instance2"

  Cluster3Name:
    Description: Name of the third test cluster
    Value: !Ref Cluster3Name
    Export:
      Name: !Sub "${AWS::StackName}-Cluster3Name"

  Cluster3Instance1Id:
    Description: Cluster 3 Instance 1 ID
    Value: !Ref Cluster3Instance1
    Export:
      Name: !Sub "${AWS::StackName}-Cluster3Instance1"

  EC2TestingPolicyArn:
    Description: ARN of the EC2 testing policy attached to pipeline execution role
    Value: !Ref EC2TestingPolicy
    Export:
      Name: !Sub "${AWS::StackName}-EC2TestingPolicy"
