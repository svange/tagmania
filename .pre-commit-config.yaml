repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: '(^templates/.*\.yaml$|.*template\.yaml$)'
      - id: check-added-large-files
      - id: check-ast
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: forbid-env-commit
        name: Block .env files
        entry: ".env files must not be committed"
        language: fail
        files: '(^|/)\.env($|\.)'
        exclude: '(^|/)\.env\.example$'

      - id: ruff-format
        name: Ruff format
        entry: uv run --no-sync ruff format src/ tests/
        language: system
        files: '\.py$'
        pass_filenames: false

      - id: ruff-check
        name: Ruff check
        entry: uv run --no-sync ruff check --fix src/ tests/
        language: system
        files: '\.py$'
        pass_filenames: false

      - id: mypy
        name: MyPy type checking
        entry: uv run --no-sync mypy src/
        language: system
        files: '\.py$'
        pass_filenames: false

      - id: uv-lock-check
        name: Check uv.lock is up to date
        entry: uv lock --check
        language: system
        files: 'pyproject\.toml$'
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
