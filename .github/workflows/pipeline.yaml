name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
      - dev
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - dev

env:
  TESTING_REGION: ${{ vars.TESTING_REGION }}
  TESTING_ARTIFACTS_BUCKET: ${{ vars.TESTING_ARTIFACTS_BUCKET }}
  TESTING_CLOUDFORMATION_EXECUTION_ROLE: ${{ vars.TESTING_CLOUDFORMATION_EXECUTION_ROLE }}
  TESTING_PIPELINE_EXECUTION_ROLE: ${{ vars.TESTING_PIPELINE_EXECUTION_ROLE }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  MODULE_NAME: ${{ vars.MODULE_NAME }}
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}
  TESTING_STACK_NAME: ${{ github.event.repository.name }}-testing

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [code-quality]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Bandit security scan
        run: |
          uv run bandit -r src/ -f json -o bandit-report.json || true
          uv run bandit -r src/ -ll
        continue-on-error: false

      - name: Run pip-audit
        run: |
          uv export --no-dev --no-hashes -o prod-requirements.txt
          uv run pip-audit --desc --format json --output pip-audit-report.json \
            -r prod-requirements.txt --no-deps
        continue-on-error: false

      - name: Run Semgrep scan
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: auto
        continue-on-error: true

      - name: Generate security HTML report
        if: always()
        run: |
          cat > security-reports.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Security Scan Results</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 20px; background: #0d1117; color: #c9d1d9; }
                  .report { margin: 20px 0; padding: 15px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; }
                  .report h2 { color: #58a6ff; margin-top: 0; }
                  pre { background: #0d1117; padding: 10px; border-radius: 4px; overflow-x: auto; border: 1px solid #30363d; font-size: 12px; }
                  .error { color: #ff7b72; }
                  .warning { color: #ffa657; }
                  .info { color: #79c0ff; }
              </style>
          </head>
          <body>
              <h1>Security Scan Results</h1>
              <div class="report">
                  <h2>Bandit Security Scan</h2>
                  <pre id="bandit-content"></pre>
              </div>
              <div class="report">
                  <h2>Pip-Audit Results</h2>
                  <pre id="audit-content"></pre>
              </div>
              <script>
                  const reports = [
                      {id: 'bandit-content', file: 'bandit-report.json'},
                      {id: 'audit-content', file: 'pip-audit-report.json'}
                  ];
                  reports.forEach(report => {
                      fetch(report.file)
                          .then(response => response.json())
                          .then(data => {
                              document.getElementById(report.id).textContent = JSON.stringify(data, null, 2);
                          })
                          .catch(error => {
                              document.getElementById(report.id).textContent = 'Report not available';
                          });
                  });
              </script>
          </body>
          </html>
          EOF

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-scan-results
          path: |
            bandit-report.json
            pip-audit-report.json
            security-reports.html

  compliance:
    name: Compliance
    runs-on: ubuntu-latest
    needs: [code-quality]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate license reports
        run: |
          uv export --no-hashes --no-dev > runtime-requirements.txt
          uv run pip-licenses --from=mixed --format=json --output-file=license-report.json
          uv run pip-licenses --from=mixed --format=html --output-file=license-report.html
          uv run pip-licenses --from=mixed --summary

      - name: Check license compatibility
        run: |
          python -c "
          import json
          with open('license-report.json', 'r') as f:
              deps = json.load(f)
          incompatible = []
          for dep in deps:
              license = dep.get('License', '')
              if any(gpl in license.upper() for gpl in ['GPL', 'AGPL'] if 'LGPL' not in license.upper()):
                  incompatible.append(f\"{dep['Name']}: {license}\")
          if incompatible:
              print('Incompatible licenses found:')
              for item in incompatible:
                  print(f'  - {item}')
              exit(1)
          else:
              print('All licenses compatible')
          "

      - name: Upload compliance reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: compliance-reports
          path: |
            license-report.json
            license-report.html

  build-validation:
    name: Build validation
    runs-on: ubuntu-latest
    needs: [code-quality]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build distribution
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/

  unit-tests:
    name: Unit tests
    needs: [code-quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run type checking
        run: uv run mypy src/

      - name: Run unit tests
        run: |
          uv run pytest -m "fast or (not slow and not integration)" \
            --html=test-report.html --self-contained-html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: unit-test-reports
          path: test-report.html

  deploy-test-infrastructure:
    name: Deploy test infrastructure
    runs-on: ubuntu-latest
    needs: [security, compliance, build-validation, unit-tests]
    if: |
      vars.TESTING_PIPELINE_EXECUTION_ROLE != '' &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) ||
        (github.event_name == 'pull_request' && !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository)
      )
    concurrency:
      group: testing-stack-${{ github.repository }}
      cancel-in-progress: false
    # Maintainer bypass of the approval-required environment is disabled so
    # we can exercise the environment approval flow end-to-end. To restore
    # the bypass (repo owner / MAINTAINERS list skip the manual approval
    # gate; push events run unattended), replace the line below with:
    #   environment: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login != github.repository_owner && !contains(fromJSON(vars.MAINTAINERS || '[]'), github.event.pull_request.user.login) && 'approval-required' || '' }}
    environment: approval-required
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for SAM template
        id: check_template
        run: |
          if [ -f template.yaml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up SAM CLI
        if: steps.check_template.outputs.exists == 'true'
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        if: steps.check_template.outputs.exists == 'true'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.TESTING_REGION }}
          role-session-name: testing-infra
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: Deploy test infrastructure
        if: steps.check_template.outputs.exists == 'true'
        run: |
          PIPELINE_ROLE_NAME=${TESTING_PIPELINE_EXECUTION_ROLE##*/}

          sam deploy \
            --stack-name ${TESTING_STACK_NAME} \
            --template-file template.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${TESTING_REGION} \
            --s3-bucket ${TESTING_ARTIFACTS_BUCKET} \
            --no-fail-on-empty-changeset \
            --role-arn ${TESTING_CLOUDFORMATION_EXECUTION_ROLE} \
            --parameter-overrides PipelineExecutionRoleName=${PIPELINE_ROLE_NAME}

  acceptance-tests:
    name: Acceptance tests
    needs: [deploy-test-infrastructure]
    if: |
      vars.TESTING_PIPELINE_EXECUTION_ROLE != '' &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) ||
        (github.event_name == 'pull_request' && !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository)
      )
    concurrency:
      group: testing-stack-${{ github.repository }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.TESTING_REGION }}
          role-session-name: testing-pipeline

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run acceptance tests with coverage
        run: |
          # TEMPORARY: acceptance tests disabled while iterating on the
          # pipeline itself (env approval gating, stack cleanup, etc.).
          # The full 15-minute AWS test suite is not under test here.
          # To re-enable, uncomment the pytest invocation below and
          # delete this echo:
          # uv run pytest -v \
          #   --cov=src --cov-report=html --cov-report=xml --cov-report=json \
          #   --html=test-report.html --self-contained-html
          echo "Acceptance tests skipped -- pipeline iteration mode (see comment above to restore)"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml
            coverage.json

      - name: Upload acceptance test report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: acceptance-test-reports
          path: test-report.html

  cleanup-test-infrastructure:
    name: Cleanup test infrastructure
    needs: [deploy-test-infrastructure, acceptance-tests]
    if: |
      always() &&
      needs.deploy-test-infrastructure.result != 'skipped' &&
      vars.TESTING_PIPELINE_EXECUTION_ROLE != ''
    concurrency:
      group: testing-stack-${{ github.repository }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    # Cleanup is best-effort: failures show red on this job but do not
    # fail the workflow. Investigate red cleanup jobs -- usually a test
    # template change or a terminal CloudFormation state.
    continue-on-error: true
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ env.TESTING_PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.TESTING_REGION }}
          role-session-name: testing-cleanup

      - name: Delete test infrastructure stack
        run: |
          aws cloudformation delete-stack \
            --stack-name "${TESTING_STACK_NAME}" \
            --region "${TESTING_REGION}"

          echo "Delete stack initiated for ${TESTING_STACK_NAME}"

      - name: Wait for stack deletion to complete
        run: |
          echo "Waiting for stack deletion to complete..."
          aws cloudformation wait stack-delete-complete \
            --stack-name "${TESTING_STACK_NAME}" \
            --region "${TESTING_REGION}"

          echo "Stack ${TESTING_STACK_NAME} successfully deleted"

  release:
    name: Semantic release
    needs: [unit-tests, acceptance-tests, security, compliance, build-validation]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    outputs:
      released: ${{ steps.release.outputs.released }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Force release branch to workflow sha
        run: git reset --hard ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Verify upstream has not changed
        run: |
          set +o pipefail
          UPSTREAM_BRANCH_NAME="$(git status -sb | head -n 1 | cut -d' ' -f2 | grep -E '\.{3}' | cut -d'.' -f4)"
          set -o pipefail

          if [ -z "$UPSTREAM_BRANCH_NAME" ]; then
              echo "::error::Unable to determine upstream branch name!"
              exit 1
          fi

          git fetch "${UPSTREAM_BRANCH_NAME%%/*}"

          if ! UPSTREAM_SHA="$(git rev-parse "$UPSTREAM_BRANCH_NAME")"; then
              echo "::error::Unable to determine upstream branch sha!"
              exit 1
          fi

          HEAD_SHA="$(git rev-parse HEAD)"

          if [ "$HEAD_SHA" != "$UPSTREAM_SHA" ]; then
              echo "::error::Upstream has changed, aborting release..."
              exit 1
          fi

      - name: Run semantic release
        id: release
        run: |
          RELEASED="false"

          set +e
          uv run semantic-release --strict version
          SEMANTIC_EXIT_CODE=$?
          set -e

          if [ $SEMANTIC_EXIT_CODE -eq 0 ]; then
            echo "Semantic release succeeded"
            RELEASED="true"
          else
            echo "No release needed"
          fi

          echo "released=$RELEASED" >> $GITHUB_OUTPUT

      - name: Upload distribution artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: distribution-artifacts
          path: dist/
          if-no-files-found: warn

  publish-to-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.release.outputs.released == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }}
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distribution-artifacts
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  docs:
    name: Deploy documentation
    needs: release
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate documentation
        run: |
          mkdir -p docs
          uv run pdoc --output-dir docs src/tagmania || true

      - name: Download coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-reports
          path: docs/coverage
        continue-on-error: true

      - name: Download security scan results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: security-scan-results
          path: docs/security
        continue-on-error: true

      - name: Download compliance reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compliance-reports
          path: docs/compliance
        continue-on-error: true

      - name: Download unit test report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unit-test-reports
          path: docs/tests
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
